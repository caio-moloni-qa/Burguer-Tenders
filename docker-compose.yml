services:
  db:
    image: postgres:16-alpine
    container_name: beetee-postgres
    environment:
      POSTGRES_DB: beetee_dev
      POSTGRES_USER: beetee
      POSTGRES_PASSWORD: beetee_dev_password
    ports:
      - "5432:5432"
    volumes:
      - beetee-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U beetee -d beetee_dev"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  beetee-postgres-data:
